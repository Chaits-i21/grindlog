<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 300px; margin: 0; padding: 14px; color: #222; }
    h1 { font-size: 15px; margin: 0 0 10px; }
    .row { font-size: 13px; margin: 6px 0; }
    .ok { color: #1a8a44; }
    .err { color: #d33; }
    a { color: #2a6fdb; text-decoration: none; }
    button { margin-top: 10px; padding: 6px 12px; border: none; border-radius: 6px; background: #555; color: #fff; font-size: 13px; cursor: pointer; }
    @media (prefers-color-scheme: dark) {
      body { background: #1b1b1b; color: #ddd; }
      a { color: #6ea8ff; }
    }
  </style>
</head>
<body>
  <h1>Grindlog</h1>
  <div class="row" id="config"></div>
  <div class="row" id="last"></div>
  <div class="row" id="queue"></div>
  <button id="options">Open settings</button>
  <script src="popup.js"></script>
</body>
</html>
